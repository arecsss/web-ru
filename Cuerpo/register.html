<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro | R.U</title>

    <link rel="stylesheet" href="../style/index.css">
    <!-- Cargar Supabase desde CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>
    <!-- Carga del script unificado de tema y sesión -->
    <script src="../JS/tema.js"></script>

    <!-- Lógica específica de registro para redireccionar si ya está autenticado -->
    <script>
        // Si ya está autenticado, evitar acceder a esta página de registro
        if (localStorage.getItem('loggedIn') === 'true') {
            location.href = 'index.html';
        }
    </script>

    <nav class="nav-header">
        <div class="nav-container">
            <div class="logo-wrapper" onclick="location.href='index.html'">
                <div class="rubik-cube">
                    <div class="face front"></div>
                    <div class="face back"></div>
                    <div class="face left"></div>
                    <div class="face right"></div>
                    <div class="face top"></div>
                    <div class="face bottom"></div>
                </div>
                <span class="brand-name">RU - <span class="highlight">REAL UTILITY</span></span>
            </div>

            <input type="checkbox" id="burger-toggle" class="burger-checkbox">
            <label for="burger-toggle" class="burger-label">
                <span></span>
                <span></span>
                <span></span>
            </label>
            <ul class="nav-links">
                <li><a href="index.html">Inicio</a></li>
                <li><a href="QuienSoy.html">¿Quién soy?</a></li>
                <li><a href="solicitudes.html">Solicitudes</a></li>
            </ul>

            <div class="nav-actions" id="nav-actions-container">
                <div class="theme-switch-wrapper">
                    <div class="toggle">
                        <input type="checkbox" id="dark-mode-toggle" aria-label="Alternar modo oscuro">
                        <label for="dark-mode-toggle"></label>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <div class="auth-page-container">
        <div class="auth-card">
            <h2>Crear Cuenta</h2>
            <p id="redirect-message" class="auth-redirect-msg"></p>
            <p id="error-message"    class="auth-error-msg"></p>
            <p id="success-message"  class="auth-success-msg"></p>

            <script>
                // Muestra un mensaje si el usuario fue redirigido
                var params = new URLSearchParams(window.location.search);
                if (params.has('redirect')) {
                    var msgEl = document.getElementById('redirect-message');
                    msgEl.textContent = 'Regístrate para acceder a las características.';
                    msgEl.style.display = 'block';
                }
            </script>
            <form id="register-form">
                <input type="text" id="full-name" placeholder="Nombre completo" required>
                <input type="email" id="email" placeholder="Correo electrónico" required>
                <input type="password" placeholder="Contraseña" id="regPassword" required>
                <input type="password" placeholder="Confirmar contraseña" id="regConfirmPassword" required>

                <div class="show-password-wrapper">
                    <input type="checkbox" id="viewRegPass" aria-label="Mostrar contraseñas" onclick="
                    var type = this.checked ? 'text' : 'password';
                    document.getElementById('regPassword').type = type;
                    document.getElementById('regConfirmPassword').type = type;
                ">
                    <label for="viewRegPass">Mostrar contraseñas</label>
                </div>

                <button type="submit" class="auth-submit register-submit" id="submit-btn">
                    Registrarse
                </button>
            </form>

            <a href="login.html" class="auth-switch">
                ¿Ya tienes cuenta? Inicia sesión
            </a>
        </div>
    </div>

    <script type="module">
        import { registrarConEmail, iniciarSesionConEmail } from '../JS/supabase.js';

        document.addEventListener('DOMContentLoaded', function () {
            var toggleNav = document.getElementById('dark-mode-toggle');
            if (document.body.classList.contains('dark-mode') && toggleNav) {
                toggleNav.checked = true;
            }

            if (toggleNav) {
                toggleNav.addEventListener('change', function (e) {
                    if (e.target.checked) {
                        document.body.classList.add('dark-mode');
                        localStorage.setItem('theme', 'dark-mode');
                    } else {
                        document.body.classList.remove('dark-mode');
                        localStorage.setItem('theme', 'light-mode');
                    }
                });
            }

            var form = document.getElementById('register-form');
            var errorMsg = document.getElementById('error-message');
            var successMsg = document.getElementById('success-message');
            var submitBtn = document.getElementById('submit-btn');

            form.addEventListener('submit', async function (e) {
                e.preventDefault();
                errorMsg.style.display = 'none';
                successMsg.style.display = 'none';

                var nombre = document.getElementById('full-name').value;
                var email = document.getElementById('email').value;
                var password = document.getElementById('regPassword').value;
                var confirmPassword = document.getElementById('regConfirmPassword').value;

                if (password !== confirmPassword) {
                    errorMsg.textContent = "Las contraseñas no coinciden.";
                    errorMsg.style.display = 'block';
                    return;
                }

                submitBtn.disabled = true;
                submitBtn.textContent = "Cargando...";

                const { data, error } = await registrarConEmail(email, password, nombre);

                if (error) {
                    errorMsg.textContent = "Error: " + error;
                    errorMsg.style.display = 'block';
                    submitBtn.disabled = false;
                    submitBtn.textContent = "Registrarse";
                } else {
                    // Intentar iniciar sesión automáticamente después del registro
                    const { data: loginData, error: loginError } = await iniciarSesionConEmail(email, password);
                    
                    if (loginError) {
                        // Si falla el login automático, mostrar mensaje de confirmación
                        successMsg.textContent = "¡Registro exitoso! Por favor, revisa tu correo para confirmar tu cuenta.";
                        successMsg.style.display = 'block';
                        form.reset();
                        submitBtn.textContent = "Registrado";
                    } else {
                        // Si el login es exitoso, guardar sesión con el nombre y redirigir
                        localStorage.setItem('loggedIn', 'true');
                        localStorage.setItem('userEmail', email);
                        localStorage.setItem('userName', nombre); /* Guardar el nombre completo del usuario */
                        
                        var params = new URLSearchParams(window.location.search);
                        var redirect = params.get('redirect');
                        location.href = redirect ? redirect : 'index.html';
                    }
                }
            });
        });
    </script>
</body>

</html>
