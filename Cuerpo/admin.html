<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Administración | RU</title>
    <!-- Vinculación al CSS centralizado (Buenas prácticas universitarias) -->
    <link rel="stylesheet" href="../style/index.css">
    <!-- Carga de Supabase con 'defer' para optimizar la velocidad de carga inicial -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" defer></script>
</head>
<body class="dark-mode">
    <!-- Barra de navegación del panel de administración -->
    <nav class="nav-header">
        <div class="nav-container">
            <div class="logo-wrapper" onclick="location.href='index.html'">
                <div class="rubik-cube">
                    <div class="face front"></div>
                    <div class="face back"></div>
                    <div class="face left"></div>
                    <div class="face right"></div>
                    <div class="face top"></div>
                    <div class="face bottom"></div>
                </div>
                <span class="brand-name">RU - <span class="highlight">ADMIN</span></span>
            </div>
            <ul class="nav-links">
                <li><a href="index.html">Volver a la Web</a></li>
            </ul>
        </div>
    </nav>

    <!-- Mensaje de seguridad si el usuario no tiene acceso administrativo -->
    <div id="admin-login-msg">
        <h2>Acceso Restringido</h2>
        <p>Solo el administrador puede ver esta página.</p>
        <a href="login.html" class="btn-primary">Iniciar Sesión</a>
    </div>

    <!-- Contenido principal del Panel de Administración (Oculto por defecto) -->
    <div id="admin-content" class="admin-container" style="display: none;">
        <h1 class="ru-solicitudes-title">Panel de <span class="ru-accent">Control</span></h1>
        
        <!-- Sección de Estadísticas Rápidas -->
        <div class="stats-grid">
            <div class="stat-card">
                <span id="stat-users" class="stat-number">0</span>
                <span class="stat-label">Usuarios Activos</span>
            </div>
            <div class="stat-card">
                <span id="stat-tickets" class="stat-number">0</span>
                <span class="stat-label">Tickets Totales</span>
            </div>
            <div class="stat-card">
                <span id="stat-messages" class="stat-number">0</span>
                <span class="stat-label">Mensajes en Chat</span>
            </div>
        </div>

        <!-- Tabla para la gestión de Solicitudes/Tickets -->
        <div class="admin-table-container">
            <h2>Gestión de Mensajes Recibidos</h2>
            <table id="tickets-table">
                <thead>
                    <tr>
                        <th>Fecha</th>
                        <th>Tipo</th>
                        <th>Asunto</th>
                        <th>Usuario</th>
                        <th>Mensaje</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody id="tickets-body">
                    <!-- Los tickets se inyectan aquí dinámicamente mediante JavaScript -->
                </tbody>
            </table>
        </div>
    </div>

    <!-- LÓGICA DE FUNCIONAMIENTO (JavaScript) -->
    <script type="module">
        // Importación de la conexión centralizada a Supabase
        import { supabase } from '../JS/supabase.js';

        document.addEventListener('DOMContentLoaded', async function() {
            // --- SEGURIDAD: Verificación de privilegios de administrador ---
            const ADMIN_EMAIL = 'jibarracuervo@gmail.com'; 
            const userEmail = localStorage.getItem('userEmail');
            const loggedIn = localStorage.getItem('loggedIn') === 'true';

            if (loggedIn && userEmail === ADMIN_EMAIL) {
                document.getElementById('admin-content').style.display = 'block';
                document.getElementById('admin-login-msg').style.display = 'none';
                
                // Carga inicial de datos
                loadStats();
                loadAllData();

                // --- SUSCRIPCIÓN EN TIEMPO REAL ---
                // Escuchar cambios en las 3 tablas para actualizar el panel al instante
                const tables = ['sugerencias', 'quejas', 'solicitudes_servicio'];
                tables.forEach(table => {
                    supabase
                        .channel(`public:${table}`)
                        .on('postgres_changes', { event: '*', schema: 'public', table: table }, payload => {
                            console.log(`Cambio detectado en ${table}:`, payload);
                            loadStats();
                            loadAllData();
                        })
                        .subscribe();
                });
            }

            // --- FUNCIÓN: Cargar Estadísticas ---
            async function loadStats() {
                // Contar total combinando las 3 tablas
                const [sug, que, sol] = await Promise.all([
                    supabase.from('sugerencias').select('*', { count: 'exact', head: true }),
                    supabase.from('quejas').select('*', { count: 'exact', head: true }),
                    supabase.from('solicitudes_servicio').select('*', { count: 'exact', head: true })
                ]);
                
                const totalTickets = (sug.count || 0) + (que.count || 0) + (sol.count || 0);
                document.getElementById('stat-tickets').textContent = totalTickets;

                // Contar mensajes de chat
                const { count: msgCount } = await supabase
                    .from('mensajes_chat')
                    .select('*', { count: 'exact', head: true });
                document.getElementById('stat-messages').textContent = msgCount || 0;

                // Contar usuarios únicos
                const { data: userData } = await supabase.from('mensajes_chat').select('usuario_email');
                const uniqueUsers = new Set(userData?.map(u => u.usuario_email));
                document.getElementById('stat-users').textContent = uniqueUsers.size || 0;
            }

            // --- FUNCIÓN: Cargar y Combinar Datos de las 3 Tablas ---
            async function loadAllData() {
                const [sug, que, sol] = await Promise.all([
                    supabase.from('sugerencias').select('*'),
                    supabase.from('quejas').select('*'),
                    supabase.from('solicitudes_servicio').select('*')
                ]);

                // Etiquetar y combinar
                let allItems = [
                    ...(sug.data || []).map(i => ({ ...i, tipo: 'Sugerencia' })),
                    ...(que.data || []).map(i => ({ ...i, tipo: 'Queja' })),
                    ...(sol.data || []).map(i => ({ ...i, tipo: 'Solicitud' }))
                ];

                // Ordenar por fecha descendente
                allItems.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));

                renderTable(allItems);
            }

            function renderTable(items) {
                const tbody = document.getElementById('tickets-body');
                tbody.innerHTML = '';

                items.forEach(item => {
                    const date = new Date(item.created_at).toLocaleDateString();
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td>${date}</td>
                        <td><span class="badge badge-${item.tipo.toLowerCase()}">${item.tipo}</span></td>
                        <td>${item.asunto}</td>
                        <td>${item.email || 'Anónimo'}</td>
                        <td>${item.mensaje}</td>
                        <td>
                            <button class="btn-delete" data-id="${item.id}" data-table="${item.tipo === 'Sugerencia' ? 'sugerencias' : item.tipo === 'Queja' ? 'quejas' : 'solicitudes_servicio'}">Eliminar</button>
                        </td>
                    `;
                    tbody.appendChild(tr);
                });

                // Funcionalidad de eliminación
                document.querySelectorAll('.btn-delete').forEach(btn => {
                    btn.addEventListener('click', async (e) => {
                        const id = e.target.getAttribute('data-id');
                        const table = e.target.getAttribute('data-table');
                        if (confirm('¿Estás seguro de que quieres eliminar este registro?')) {
                            const { error } = await supabase.from(table).delete().eq('id', id);
                            if (!error) {
                                loadStats();
                                loadAllData();
                            }
                        }
                    });
                });
            }
        });
    </script>
</body>
</html>
